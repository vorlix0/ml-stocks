name: Train & Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Only one run at a time; cancel in-flight runs on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  train-and-report:
    name: Train model and generate report
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[all]"

      - name: Download market data
        run: python cli.py download

      - name: Process data and engineer features
        run: python cli.py process

      - name: Train model
        run: python cli.py train

      - name: Run backtest
        run: python cli.py backtest

      - name: Generate HTML report
        run: python scripts/generate_report.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The docs/ directory contains index.html + any static assets
          path: docs/

  deploy:
    name: Deploy to GitHub Pages
    needs: train-and-report
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
